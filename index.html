<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waves HUB</title>
  <meta name="theme-color" content="#020626" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="brand-card">
        <img class="logo" src="https://drive.google.com/thumbnail?id=12G4Xs9j-0iLixYeJnmbK6X2HaQs2bFM2&sz=w400" alt="Waves Plus">
        <span>Waves HUB</span>
      </div>

      <div class="badge">CATÁLOGO DIGITAL 2026</div>

      <h1>O hub de quem vive do trabalho.</h1>

      <p>
        Catálogo, atendimento e ferramentas comerciais da Waves Plus em um só lugar.
      </p>

      <div class="actions">
        <a class="btn yellow" href="https://drive.google.com/file/d/1JUZRykitPg1_Isv2_Fz4SB7yy80ilMc0/view" target="_blank">
          Abrir Catálogo
        </a>
        <a class="btn green" href="https://wa.me/558530318830?text=Ol%C3%A1%2C%20quero%20atendimento%20pelo%20Waves%20HUB." target="_blank">
          Falar no WhatsApp
        </a>
      </div>
    </section>

    <section class="grid">
      <button class="tile" onclick="openSection('catalogo')">
        <strong>📖 Catálogo</strong>
        <span>PDF oficial Waves Plus 2026</span>
      </button>

      <button class="tile" onclick="openSection('solda')">
        <strong>🛠 Solda Certa</strong>
        <span>Guia inteligente de soldagem</span>
      </button>

      <button class="tile" onclick="openSection('fixa')">
        <strong>🔩 Fixa Certo</strong>
        <span>Soluções para fixação</span>
      </button>

      <button class="tile" onclick="openSection('calculadoras')">
        <strong>📐 Calculadoras</strong>
        <span>Ferramentas comerciais</span>
      </button>
    </section>

    <section id="content" class="content">
      <h2>Produtos em destaque</h2>

      <div class="search-box">
        <input id="searchInput" type="search" placeholder="Buscar produto, código ou categoria..." oninput="renderProducts()" />
      </div>

      <div id="products" class="products"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="#top">Início</a>
    <a href="https://drive.google.com/file/d/1JUZRykitPg1_Isv2_Fz4SB7yy80ilMc0/view" target="_blank">Catálogo</a>
    <a href="https://wa.me/558530318830?text=Ol%C3%A1%2C%20quero%20atendimento%20pelo%20Waves%20HUB." target="_blank">WhatsApp</a>
  </nav>

  <script src="script.js"></script>
</body>
</html>
